<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacanze Cilento</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>✈️ Vacanze Cilento</h1>

    <!-- SEZIONE VACANZE -->
    <div class="section">
      <h2>Crea Vacanza</h2>
      <input type="text" id="vacanzaInput" placeholder="Nome vacanza">
      <input type="date" id="dataInizioInput">
      <input type="date" id="dataFineInput">
      <button id="aggiungiVacanzaBtn">Aggiungi Vacanza</button>
    </div>

    <!-- SEZIONE ATTIVITÀ -->
    <div class="section">
      <h2>Gestisci Attività</h2>
      
      <select id="vacanzaSelect">
        <option value="">Seleziona vacanza...</option>
      </select>

      <select id="categoriaSelect">
        <option value="">Seleziona categoria...</option>
        <option value="giorno">☀️ Giorno (Mare, Trekking, Visite)</option>
        <option value="sera">🌙 Sera (Cena, Sagre, Eventi)</option>
      </select>

      <h3>Scegli dal repository oppure inserisci manualmente:</h3>
      
      <select id="attivitaSelect">
        <option value="">Scegli dal repository...</option>
      </select>

      <div style="margin-top: 10px;">
        <input type="text" id="attivitaInput" placeholder="Nome attività">
        <input type="text" id="luogoInput" placeholder="Luogo">
      </div>

      <input type="number" id="budgetInput" placeholder="Budget (€)" step="0.01">
      <button id="aggiungiAttivitaBtn">Aggiungi Attività</button>
    </div>

    <!-- LISTA ATTIVITÀ -->
    <div class="section">
      <h2>Attività Programmate</h2>
      <ul id="listaAttivita"></ul>
      <h3>Budget Totale: €<span id="totaleBudget">0.00</span></h3>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
