<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: Arial; background: linear-gradient(to right, #87CEEB, #E0F6FF); }
  .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
  .header { text-align: center; color: #0066cc; margin-bottom: 30px; }
  .card { background: white; border-radius: 10px; padding: 20px; margin: 15px 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .card h3 { color: #ff6b6b; }
  button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
  button:hover { background: #004499; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🏖️ Le Tue Vacanze</h1>
  </div>
  
  <div class="card">
    <h3>Destinazione</h3>
    <input type="text" placeholder="Dove vuoi andare?">
  </div>
  
  <div class="card">
    <h3>Date</h3>
    <input type="date"> - <input type="date">
  </div>
  
  <div class="card">
    <h3>Budget</h3>
    <input type="number" placeholder="€">
  </div>
  
  <button>Pianifica Vacanza</button>
</div>
</body>
</html>
