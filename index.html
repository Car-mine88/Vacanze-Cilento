<!DOCTYPE html>
<html lang="it" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vacanze Cilento - Pianifica e gestisci le tue vacanze con facilità">
  <meta name="theme-color" content="#6366f1">
  
  <title>🏖️ Vacanze Cilento</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%236366f1' width='180' height='180'/><text x='50%' y='50%' font-size='100' fill='white' text-anchor='middle' dy='.3em'>🏖️</text></svg>">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="container">
      <div class="header-left">
        <h1 class="logo">🏖️ Vacanze Cilento</h1>
      </div>
      
      <div class="header-right">
        <button id="darkModeToggle" class="btn-icon" title="Modalità scura">
          <span id="darkModeIcon">🌙</span>
        </button>
        
        <button id="exportBtn" class="btn btn-secondary" title="Esporta tutte le vacanze">
          📥 Esporta
        </button>
        
        <button id="importBtn" class="btn btn-secondary" title="Importa vacanze">
          📤 Importa
        </button>
        
        <button id="shareBtn" class="btn btn-secondary" title="Condividi vacanza">
          🔗 Condividi
        </button>

        <input type="file" id="fileInput" accept=".json" style="display: none;">
      </div>
    </div>
  </header>

  <!-- TABS -->
  <div class="tabs">
    <div class="container">
      <button data-tab="create" class="tab-btn active">➕ Nuova Vacanza</button>
      <button data-tab="manage" class="tab-btn">📋 Gestisci Vacanze</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <main class="main">
    <div class="container">
      
      <!-- TAB: CREATE VACATION -->
      <div id="create-content" class="tab-content active">
        <h2>Crea una Nuova Vacanza</h2>
        <button id="createVacationBtn" class="btn btn-primary btn-large">
          ➕ Nuova Vacanza
        </button>

        <div class="vacations-grid">
          <h3>Le tue vacanze:</h3>
          <div id="vacationsList"></div>
        </div>
      </div>

      <!-- TAB: MANAGE VACATIONS -->
      <div id="manage-content" class="tab-content">
        <div id="vacationDetail" class="detail-container">
          <p class="empty-state">👈 Seleziona una vacanza dalla lista per iniziare!</p>
        </div>
      </div>

    </div>
  </main>

  <!-- SHARE MODAL -->
  <div id="qrCodeContainer" class="share-modal-content" style="display: none;">
    <h3>Condividi la tua vacanza</h3>
    <div id="qrCode"></div>
    <input type="text" id="shareLink" readonly placeholder="Link di condivisione">
    <button onclick="document.getElementById('shareLink').select(); document.execCommand('copy');" class="btn btn-small">
      📋 Copia Link
    </button>
  </div>

  <!-- ACTIVITY/VACATION MODAL -->
  <div id="activityModal" class="modal">
    <!-- Contenuto dinamico -->
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>🏖️ Vacanze Cilento v2.0 | Pianifica con stile!</p>
      <p>💾 Tutti i dati sono salvati localmente sul tuo dispositivo</p>
    </div>
  </footer>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="app.js"></script>
  <script>
    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>
